<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantWorld Level 1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1a10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden}
#wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
canvas{border-radius:12px;box-shadow:0 0 50px rgba(76,200,80,.5),0 0 100px rgba(76,200,80,.2);border:3px solid rgba(76,200,80,.6);display:block}
#hud{display:flex;gap:20px;color:#fff;font-size:15px;font-weight:bold;text-shadow:0 0 10px rgba(100,255,100,.5);background:rgba(0,0,0,.5);padding:6px 20px;border-radius:20px;border:1px solid rgba(76,200,80,.3)}
#ctrl{color:rgba(255,255,255,.35);font-size:11px;letter-spacing:.5px}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c" width="800" height="480"></canvas>
<div id="hud">
  <span id="hSeeds">🌱 0/20</span>
  <span id="hScore">⭐ 0</span>
  <span id="hLives">❤️ 3</span>
  <span id="hPower">🌿 Stem</span>
  <span id="hSun" style="color:#FFD700"></span>
</div>
<div id="ctrl">← → Move | Shift Sprint | Z/Space Jump (Double Jump!) | X Shoot/Throw | ↓+near shell = Pick Up</div>
</div>
<script>
'use strict';
const CV=document.getElementById('c'),cx=CV.getContext('2d');
const W=800,H=480,WORLD_W=9000,GY=400,GRAV=0.58,MAX_VY=17;
const PSPD=3.8,SPRINT=6.5,JF=-13.5,JF2=-9.0,SUN_DUR=360;
// ── L3 Boss Arena Constants ──
const L3_SEEDMAN_PIPE_X=80,L3_SEEDMAN_PIPE_W=340,L3_SEEDMAN_PIPE_Y=380;
const L3_BOSS_Y=280;
const L3_BOSS_PIPE_R_X=560,L3_BOSS_PIPE_R_W=160,L3_BOSS_PIPE_R_Y=410;
const L3_WORLD_BOTTOM=3120;

// INPUT
let K={},PK={};
document.addEventListener('keydown',e=>{if(!K[e.code])K[e.code]=true;if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyZ','KeyX','KeyA','KeyD','KeyW','KeyS','ShiftLeft','ShiftRight'].includes(e.code))e.preventDefault();});
document.addEventListener('keyup',e=>{K[e.code]=false;PK[e.code]=false;});
function pressed(c){return K[c]&&!PK[c];}

// GLOBALS
let gs='menu',score=0,lives=3,seeds=0,camX=0,tick=0;
let player=null;
let enemies=[],platforms=[],pblocks=[],pickups=[],seedItems=[],projs=[],parts=[],clouds=[],birds=[];
let floatTexts=[],heldWrapper=null;
// L2 globals (declared here so Player class + drawBG can reference safely)
let logBoat=null,spawnTick=0,lvl2prog=0;
let cutState='',cutTimer=0;
let currentLevel=1;
// ── LEVEL 3 GLOBALS ──
let l3CamY=0,l3Winston=null,l3Pipes=[],l3PowerPipes=[];
let winstonTimer=0,winstonBattleStarted=false;
let winstonSmokeWarnings=[],winstonCoinWarning=null;
let l3BossPhase=false,l3LightningBolts=[],l3FireParts=[];

// GROUND SEGMENTS (create gaps like Mario)
const L1_SEGS=[
  {x:0,w:1300},
  {x:1400,w:1300},{x:2700,w:1500},
  {x:4300,w:1200},{x:5600,w:1150},
  {x:6850,w:2150}
];
let groundSegs=[...L1_SEGS];

function onGround(px,pw,py,ph){
  const bot=py+ph;
  if(Math.abs(bot-GY)>8)return false;
  return groundSegs.some(s=>px+pw>s.x&&px<s.x+s.w);
}
function groundUnder(px,pw){
  return groundSegs.some(s=>px+pw>s.x+4&&px<s.x+s.w-4);
}

class FloatText{constructor(x,y,txt,col){this.x=x;this.y=y;this.txt=txt;this.col=col;this.life=40;this.vy=-1.8;}update(){this.y+=this.vy;this.vy*=.9;this.life--;}draw(){if(this.life<=0)return;cx.globalAlpha=Math.max(0,this.life/40);cx.fillStyle=this.col;cx.font='bold 21px "Segoe UI"';cx.textAlign='center';cx.fillText(this.txt,this.x-camX,this.y);cx.globalAlpha=1;}}
function addFloat(x,y,txt,col){floatTexts.push(new FloatText(x,y,txt,col));}
// UTILS
function rnd(a,b){return a+Math.random()*(b-a);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function burst(x,y,col,n=8){for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),s=rnd(1.5,5);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:rnd(25,50),ml:50,col,r:rnd(3,7)});}}

// DRAW HELPERS
function rRect(x,y,w,h,r,fill,stroke,lw=2){cx.lineWidth=lw;cx.fillStyle=fill;cx.strokeStyle=stroke;cx.beginPath();cx.roundRect(x,y,w,h,r);cx.fill();cx.stroke();}
function circle(x,y,r,fill,stroke,lw=2){cx.lineWidth=lw;cx.fillStyle=fill;cx.strokeStyle=stroke;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill();cx.stroke();}
function drawEyes(ex,ey,angry=false){
  cx.fillStyle='#1a237e';
  cx.beginPath();cx.arc(ex-5,ey,3,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(ex+5,ey,3,0,Math.PI*2);cx.fill();
  cx.fillStyle='white';cx.beginPath();cx.arc(ex-3.5,ey-1,1.3,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(ex+6.5,ey-1,1.3,0,Math.PI*2);cx.fill();
  cx.strokeStyle='#1a237e';cx.lineWidth=1.8;
  if(angry){cx.beginPath();cx.moveTo(ex-9,ey-5);cx.lineTo(ex-1,ey-2);cx.stroke();cx.beginPath();cx.moveTo(ex+9,ey-5);cx.lineTo(ex+1,ey-2);cx.stroke();cx.beginPath();cx.arc(ex,ey+6,5,Math.PI*.1,Math.PI*.9,true);cx.stroke();}
  else{cx.beginPath();cx.arc(ex,ey+5,4,0.1,Math.PI-0.1);cx.stroke();}
}

// PLAYER
class Player{
  constructor(){this.x=100;this.y=GY-52;this.w=32;this.h=52;this.vx=0;this.vy=0;this.onGr=false;this.form='stem';this.inv=0;this.sunT=0;this.hue=0;this.wc=0;this.walkC=0;this.facingR=true;this.dead=false;this.jumps=0;}
  get left(){return this.x;}get right(){return this.x+this.w;}get top(){return this.y;}get bottom(){return this.y+this.h;}get cx(){return this.x+this.w/2;}
  update(){
    if(this.dead)return;
    if(this.form==='sun'){this.sunT--;this.hue=(this.hue+8)%360;if(this.sunT<=0)this.form='flower';}
    const sprint=(K['ShiftLeft']||K['ShiftRight'])&&this.onGr;
    let spd=(sprint?SPRINT:PSPD)*(this.form==='sun'?1.8:1);
    if(K['ArrowLeft']||K['KeyA']){this.vx=-spd;this.facingR=false;if(this.onGr)this.walkC+=sprint?.28:.18;}
    else if(K['ArrowRight']||K['KeyD']){this.vx=spd;this.facingR=true;if(this.onGr)this.walkC+=sprint?.28:.18;}
    else this.vx*=.75;
    // Jump / double jump
    if(pressed('Space')||pressed('KeyZ')||pressed('ArrowUp')){
      if(this.onGr){this.vy=JF;this.onGr=false;this.jumps=1;}
      else if(this.jumps===1){this.vy=JF2;this.jumps=2;burst(this.cx,this.bottom,'#A5D6A7',5);}
    }
    if(pressed('KeyX')){
      if(this.form==='water'&&!heldWrapper&&this.wc<=0){this.shootWater();this.wc=25;}
      else if(heldWrapper)this.throwW();
    }
    if((K['ArrowDown']||K['KeyS'])&&!heldWrapper){
      for(const e of enemies){if(e instanceof Wrapper&&e.wstate==='crumpled'&&!e.held&&overlap(this,e)){e.held=true;heldWrapper=e;break;}}
    }
    if(this.wc>0)this.wc--;
    this.vy=clamp(this.vy+GRAV,-99,MAX_VY);
    this.x+=this.vx;this.y+=this.vy;
    if(this.x<0){this.x=0;this.vx=0;}
    if(this.right>WORLD_W){this.x=WORLD_W-this.w;this.vx=0;}
    this.onGr=false;
    if(currentLevel!==3){
      // Ground collision with segments
      if(this.vy>=0&&this.bottom>=GY&&this.bottom<=GY+MAX_VY+2){
        if(groundUnder(this.x,this.w)){this.y=GY-this.h;this.vy=0;this.onGr=true;this.jumps=0;}
      }
      // Platforms
      for(const p of platforms){
        if(this.right<=p.x||this.left>=p.x+p.w)continue;
        if(this.vy>=0&&this.bottom>=p.y&&this.bottom<=p.y+p.h+MAX_VY&&this.y<p.y){this.y=p.y-this.h;this.vy=0;this.onGr=true;this.jumps=0;}
      }
      // Plant blocks (hit from below)
      for(const b of pblocks){
        if(this.right<=b.x||this.left>=b.x+b.w)continue;
        if(this.vy<0&&this.top<=b.y+b.h&&this.top>=b.y-8&&this.bottom>b.y){this.y=b.y+b.h;this.vy=0;b.hit();}
        if(this.vy>=0&&this.bottom>=b.y&&this.bottom<=b.y+b.h+4&&this.y<b.y){this.y=b.y-this.h;this.vy=0;this.onGr=true;this.jumps=0;}
      }
    }
    if(this.inv>0)this.inv--;
    if(currentLevel!==3&&this.y>H+200)this.die();
    // Log boat ride
    if(logBoat&&this.vy>=0&&this.bottom>=logBoat.y&&this.bottom<=logBoat.y+MAX_VY&&this.right>logBoat.x&&this.left<logBoat.x+logBoat.w){
      this.y=logBoat.y-this.h;this.vy=0;this.onGr=true;this.jumps=0;this.x+=logBoat.vx;
    }
    // L2: fall in water → die
    if(currentLevel===2&&typeof logBoat!=='undefined'&&logBoat&&typeof spawnTick!=='undefined'&&this.bottom>GY+90&&!this.dead)this.die();
    if(currentLevel!==3) camX=clamp(this.cx-W/2,0,WORLD_W-W);
    if(this.form==='sun'){
      for(const e of enemies){if(e.alive&&overlap(this,e)){e.kill?e.kill():(e.alive=false);score+=100;burst(e.x+e.w/2,e.y,'#FFD700');}}
    }
  }
  shootWater(){const d=this.facingR?1:-1;projs.push({x:this.cx+d*18,y:this.y+this.h*.4,vx:d*9,vy:-.5,type:'water',life:65,w:14,h:12});}
  throwW(){if(!heldWrapper)return;heldWrapper.vx=(this.facingR?1:-1)*11;heldWrapper.wstate='shell';heldWrapper.held=false;heldWrapper=null;floatTexts=[];}
  takeDamage(){ return; /* PLAYTEST INVINCIBILITY */ }
  die(){if(this.dead)return;this.dead=true;lives--;burst(this.cx,this.cy,'#FF5252',16);setTimeout(()=>{if(lives>0){if(currentLevel===3)initL3();else if(currentLevel===2)initL2();else initLevel();}else gs='over';},1200);gs='dead';}
  gainPower(type){
    if(type==='apple'&&this.form==='stem')this.form='flower';
    else if(type==='water')this.form='water';
    else if(type==='sun'){this.form='sun';this.sunT=SUN_DUR;}
    burst(this.cx,this.cy,type==='water'?'#29B6F6':type==='sun'?'#FFD700':'#8D6E63',12);score+=50;
  }
  get cy(){return this.y+this.h/2;}
  draw(){
    if(this.dead)return;
    if(this.inv>0&&Math.floor(tick/4)%2===0)return;
    const sx=this.x-camX,sy=this.y;
    cx.save();
    let sqX=1,sqY=1;
    if(this.onGr){sqX=Math.min(1+Math.abs(this.vx)*.02,1.22);sqY=Math.max(1-Math.abs(this.vx)*.02,.82);}
    else{sqY=Math.min(1+Math.abs(this.vy)*.012,1.25);sqX=Math.max(1-Math.abs(this.vy)*.012,.8);}
    const bDir=this.facingR?sqX:-sqX;
    cx.translate(sx+this.w/2,sy+this.h);cx.scale(bDir,sqY);cx.translate(-(sx+this.w/2),-(sy+this.h));
    if(this.form==='sun'){const g=cx.createRadialGradient(sx+this.w/2,sy+this.h/2,4,sx+this.w/2,sy+this.h/2,52);g.addColorStop(0,`hsla(${this.hue},100%,65%,.6)`);g.addColorStop(1,'transparent');cx.fillStyle=g;cx.beginPath();cx.arc(sx+this.w/2,sy+this.h/2,52,0,Math.PI*2);cx.fill();}
    const bcx=sx+this.w/2;
    let bodyCol='#88C057',petalCol=null;
    if(this.form==='flower'){bodyCol='#81C784';petalCol='#FFFFFF';}
    else if(this.form==='water'){bodyCol='#42A5F5';petalCol='#90CAF9';}
    else if(this.form==='sun'){bodyCol=`hsl(${this.hue},90%,55%)`;petalCol=`hsl(${(this.hue+40)%360},90%,75%)`;}
    const lg=Math.sin(this.walkC)*12;
    cx.fillStyle='#5D4037';cx.strokeStyle='#3E2723';cx.lineWidth=1.5;
    cx.beginPath();cx.ellipse(bcx-8+lg*.3,sy+this.h+3,7,6,lg*.05,0,Math.PI*2);cx.fill();cx.stroke();
    cx.beginPath();cx.ellipse(bcx+8-lg*.3,sy+this.h+3,7,6,-lg*.05,0,Math.PI*2);cx.fill();cx.stroke();
    rRect(bcx-10,sy+this.h*.38,20,this.h*.62,5,bodyCol,'#33691E',2);
    cx.fillStyle='#66BB6A';cx.strokeStyle='#33691E';cx.lineWidth=1.5;
    cx.beginPath();cx.ellipse(bcx-19,sy+this.h*.5,15,8,-.4,0,Math.PI*2);cx.fill();cx.stroke();
    cx.beginPath();cx.ellipse(bcx+19,sy+this.h*.65,15,8,.4,0,Math.PI*2);cx.fill();cx.stroke();
    if(petalCol){
      for(let i=0;i<6;i++){const a=(Math.PI*2/6)*i+Math.sin(tick*.04)*.08;cx.fillStyle=petalCol;cx.strokeStyle='#388E3C';cx.lineWidth=1.5;cx.beginPath();cx.ellipse(bcx+Math.cos(a)*17,sy+16+Math.sin(a)*17,8,6,a,0,Math.PI*2);cx.fill();cx.stroke();}
      circle(bcx,sy+16,13,'#FFEE58','#F57F17',2);drawEyes(bcx,sy+13);
    }else{cx.fillStyle='#A5D6A7';cx.strokeStyle='#388E3C';cx.lineWidth=2;cx.beginPath();cx.ellipse(bcx,sy+17,13,18,0,0,Math.PI*2);cx.fill();cx.stroke();drawEyes(bcx,sy+14);}
    if(heldWrapper){const hx=this.facingR?sx+this.w+5:sx-25;circle(hx+11,sy+this.h*.45,11,'#CFD8DC','#607D8B',2);}
    cx.restore();
  }
}

// BOTTLE ENEMY
class Bottle{
  constructor(x){this.x=x;this.y=GY-46;this.w=28;this.h=46;this.vx=-1.6;this.vy=0;this.alive=true;this.sqT=0;this.onGr=false;}
  get left(){return this.x;}get right(){return this.x+this.w;}get top(){return this.y;}get bottom(){return this.y+this.h;}get cx(){return this.x+this.w/2;}
  update(){
    if(!this.alive){this.sqT--;return;}
    this.vy=clamp(this.vy+GRAV,-99,MAX_VY);
    this.y+=this.vy;this.x+=this.vx;
    this.onGr=false;
    // Ground
    if(this.vy>=0&&this.bottom>=GY){if(groundUnder(this.x,this.w)){this.y=GY-this.h;this.vy=0;this.onGr=true;}else if(this.bottom>GY+20&&!groundUnder(this.x,this.w)){/*falling in gap*/}}
    // Platforms
    for(const p of platforms){if(this.right<=p.x||this.left>=p.x+p.w)continue;if(this.vy>=0&&this.bottom>=p.y&&this.bottom<=p.y+p.h+MAX_VY&&this.y<p.y){this.y=p.y-this.h;this.vy=0;this.onGr=true;}}
    // Bins – solid wall
    for(const e of enemies){if(!(e instanceof RecyclingBin))continue;if(this.bottom>e.y+e.h||this.top>e.y+e.h)continue;if(this.right>e.x&&this.left<e.x&&this.vx>0){this.x=e.x-this.w;this.vx=-Math.abs(this.vx);}if(this.left<e.x+e.w&&this.right>e.x+e.w&&this.vx<0){this.x=e.x+e.w;this.vx=Math.abs(this.vx);}}
    // Drift with boat while falling toward it
    if(logBoat&&this.vy>0&&this.bottom<logBoat.y&&this.x>logBoat.x-100&&this.x<logBoat.x+logBoat.w+100)this.x+=logBoat.vx;
    // Land on log boat + bounce at edges
    if(logBoat&&this.vy>=0&&this.bottom>=logBoat.y&&this.bottom<=logBoat.y+MAX_VY&&this.right>logBoat.x&&this.left<logBoat.x+logBoat.w){this.y=logBoat.y-this.h;this.vy=0;this.x+=logBoat.vx;if(this.left<logBoat.x+4)this.vx=Math.abs(this.vx);if(this.right>logBoat.x+logBoat.w-4)this.vx=-Math.abs(this.vx);}
    // Turn at ground edge
    if(this.onGr&&!groundUnder(this.x+(this.vx>0?this.w+4:-4),4))this.vx*=-1;
    if(this.x<0||this.right>WORLD_W)this.vx*=-1;
    // Stomp check
    if(!player.dead&&player.vy>0&&player.bottom>this.top&&player.bottom<this.top+this.h*.65&&player.right>this.left+3&&player.left<this.right-3){
      player.vy=-9;this.kill();score+=100;addFloat(this.cx,this.top,'+100','#FFD700');
    }else if(!player.dead&&overlap(player,this)&&player.form!=='sun'&&player.inv<=0)player.takeDamage();
  }
  kill(){this.alive=false;this.sqT=30;burst(this.cx,this.top,'#29B6F6',8);}
  draw(){
    if(!this.alive&&this.sqT<=0)return;
    const sx=this.x-camX,sy=this.y;
    if(!this.alive){cx.fillStyle='#29B6F6';cx.beginPath();cx.ellipse(sx+this.w/2,GY,16,6,0,0,Math.PI*2);cx.fill();return;}
    rRect(sx+this.w/2-6,sy,12,9,3,'#0288D1','#01579B',2);
    rRect(sx+this.w/2-7,sy+8,14,9,2,'#E1F5FE','#0288D1',1.5);
    rRect(sx+2,sy+16,this.w-4,this.h-20,6,'#E3F2FD','#1565C0',2);
    cx.fillStyle='#1565C0';cx.beginPath();cx.roundRect(sx+4,sy+21,this.w-8,16,2);cx.fill();
    drawEyes(sx+this.w/2,sy+27,true);
    const lg=Math.sin(tick*.15)*7;
    cx.fillStyle='#29B6F6';cx.strokeStyle='#0288D1';cx.lineWidth=1.5;
    cx.beginPath();cx.ellipse(sx+8,sy+this.h+2,6,5,lg*.08,0,Math.PI*2);cx.fill();cx.stroke();
    cx.beginPath();cx.ellipse(sx+this.w-8,sy+this.h+2,6,5,-lg*.08,0,Math.PI*2);cx.fill();cx.stroke();
  }
}

// WRAPPER ENEMY
class Wrapper{
  constructor(x){this.x=x;this.y=GY-42;this.w=38;this.h=42;this.vx=-1.4;this.vy=0;this.alive=true;this.wstate='walking';this.held=false;this.spin=0;this.onGr=false;}
  get left(){return this.x;}get right(){return this.x+this.w;}get top(){return this.y;}get bottom(){return this.y+this.h;}get cx(){return this.x+this.w/2;}
  update(){
    if(!this.alive||this.held)return;
    this.vy=clamp(this.vy+GRAV,-99,MAX_VY);
    this.y+=this.vy;
    if(this.wstate!=='crumpled')this.x+=this.vx;
    this.onGr=false;
    // Ground
    if(this.vy>=0&&this.bottom>=GY){if(groundUnder(this.x,this.w)){this.y=GY-this.h;this.vy=0;this.onGr=true;}};
    // Platforms
    for(const p of platforms){if(this.right<=p.x||this.left>=p.x+p.w)continue;if(this.vy>=0&&this.bottom>=p.y&&this.bottom<=p.y+p.h+MAX_VY&&this.y<p.y){this.y=p.y-this.h;this.vy=0;this.onGr=true;}}
    // Bins solid
    for(const e of enemies){if(!(e instanceof RecyclingBin))continue;if(this.bottom>e.y+e.h||this.top>e.y+e.h)continue;if(this.right>e.x&&this.left<e.x&&this.vx>0){this.x=e.x-this.w;this.vx=-Math.abs(this.vx);}if(this.left<e.x+e.w&&this.right>e.x+e.w&&this.vx<0){this.x=e.x+e.w;this.vx=Math.abs(this.vx);}}
    // Drift with boat while falling toward it
    if(logBoat&&this.vy>0&&this.bottom<logBoat.y&&this.x>logBoat.x-100&&this.x<logBoat.x+logBoat.w+100)this.x+=logBoat.vx;
    // Land on log boat + stay on it with edge bounce
    if(logBoat&&this.vy>=0&&this.bottom>=logBoat.y&&this.bottom<=logBoat.y+MAX_VY&&this.right>logBoat.x&&this.left<logBoat.x+logBoat.w&&this.wstate!=='crumpled'){
      this.y=logBoat.y-this.h;this.vy=0;this.x+=logBoat.vx;
      if(this.left<logBoat.x+5)this.vx=Math.abs(this.vx)||1.2;
      if(this.right>logBoat.x+logBoat.w-5)this.vx=-(Math.abs(this.vx)||1.2);
    }
    if(this.wstate==='shell')this.spin+=.3;
    if(this.wstate==='shell'){for(const e of enemies){if(e!==this&&e.alive&&overlap(this,e)){if(e instanceof RecyclingBin)continue;e.kill?e.kill():(e.alive=false);score+=200;burst(e.cx||e.x+e.w/2,e.y,'#FFEB3B',8);}}}
    // Edge turning for walking
    if(this.onGr&&this.wstate==='walking'&&!groundUnder(this.x+(this.vx>0?this.w+4:-4),4))this.vx*=-1;
    if((this.x<0||this.right>WORLD_W)&&this.wstate!=='crumpled')this.vx*=-1;
    // Player interaction
    if(!player.dead){

// RECYCLING BIN (bigger, blue, piranha fork)
class RecyclingBin{
  constructor(x){this.x=x;this.y=GY-90;this.w=60;this.h=90;this.alive=true;this.forkPhase=rnd(0,Math.PI*2);}
  get left(){return this.x;}get right(){return this.x+this.w;}get top(){return this.y;}get bottom(){return this.y+this.h;}get cx(){return this.x+this.w/2;}
  get forkT(){return Math.sin(tick*.025+this.forkPhase);}
  get forkVisible(){return this.forkT>-.3;}
  get forkDanger(){return this.forkT>.2;}
  update(){
    if(!player.dead&&this.forkDanger){
      const forkTop=this.y-62*Math.max(0,this.forkT);
      if(player.right>this.x+8&&player.left<this.right-8&&player.bottom>forkTop&&player.top<this.y&&player.inv<=0&&player.form!=='sun')
        player.takeDamage();
    }
  }
  draw(){
    const sx=this.x-camX,sy=this.y;
    // Bin body – blue
    rRect(sx,sy+30,this.w,this.h-30,[0,0,10,10],'#1565C0','#0D47A1',3);
    rRect(sx-5,sy+22,this.w+10,14,5,'#1976D2','#0D47A1',2.5);
    // Recycling symbol
    cx.font='bold 28px serif';cx.textAlign='center';cx.fillStyle='rgba(255,255,255,.8)';cx.fillText('♻',sx+this.w/2,sy+72);
    // Lid stripe
    cx.fillStyle='#42A5F5';cx.beginPath();cx.roundRect(sx,sy+30,this.w,8,2);cx.fill();
    // Big piranha-style fork
    const ft=this.forkT;
    const forkH=68;
    const forkTop=sy-forkH*Math.max(0,(ft+.3)/1.3);
    if(this.forkVisible){
      // Fork handle
      cx.fillStyle='#E0E0E0';cx.strokeStyle='#9E9E9E';cx.lineWidth=2.5;
      cx.beginPath();cx.roundRect(sx+this.w/2-4,forkTop+forkH*.3,8,forkH*.7,3);cx.fill();cx.stroke();
      // Fork head (better looking)
      const fcx=sx+this.w/2;
      // Handle grip lines
      cx.strokeStyle='#90A4AE';cx.lineWidth=1;
      for(let g=0;g<3;g++){cx.beginPath();cx.moveTo(fcx-3,forkTop+forkH*.4+g*7);cx.lineTo(fcx+3,forkTop+forkH*.4+g*7);cx.stroke();}
      // Fork neck
      cx.fillStyle='#CFD8DC';cx.strokeStyle='#607D8B';cx.lineWidth=2;
      cx.beginPath();cx.roundRect(fcx-5,forkTop+forkH*.26,10,forkH*.16,2);cx.fill();cx.stroke();
      // Fork head plate
      cx.fillStyle='#ECEFF1';cx.strokeStyle='#607D8B';cx.lineWidth=2;
      cx.beginPath();cx.roundRect(fcx-16,forkTop+forkH*.1,32,forkH*.18,4);cx.fill();cx.stroke();
      // 4 tines with rounded tips
      const tineXs=[-10,-3,3,10];
      tineXs.forEach(tx=>{
        cx.strokeStyle='#546E7A';cx.lineWidth=3;
        cx.beginPath();cx.moveTo(fcx+tx,forkTop+forkH*.1);cx.lineTo(fcx+tx,forkTop);cx.stroke();
        circle(fcx+tx,forkTop-3,3,'#78909C','#546E7A',1.5);
      });
      // Evil face on fork
      const faceY=forkTop+forkH*.21;
      cx.fillStyle='#37474F';
      cx.beginPath();cx.arc(fcx-6,faceY,2.5,0,Math.PI*2);cx.fill();
      cx.beginPath();cx.arc(fcx+6,faceY,2.5,0,Math.PI*2);cx.fill();
      cx.strokeStyle='#37474F';cx.lineWidth=1.5;
      cx.beginPath();cx.arc(fcx,faceY+5,4,0,Math.PI);cx.stroke();
    }
  }
}

// PLANT BLOCK
class PlantBlock{

// PICKUP
class Pickup{
  constructor(x,y,type){this.x=x;this.y=y;this.w=32;this.h=32;this.type=type;this.vy=0;this.vx=type==='apple'?0:1.8;this.alive=true;this.rising=true;this.riseY=y-44;}
  get bottom(){return this.y+this.h;}get right(){return this.x+this.w;}
  update(){
    if(!this.alive)return;
    if(this.rising){this.y-=1.8;if(this.y<=this.riseY)this.rising=false;return;}
    this.vy=clamp(this.vy+GRAV,-99,MAX_VY);this.y+=this.vy;this.x+=this.vx;
    if(this.bottom>=GY&&groundUnder(this.x,this.w)){this.y=GY-this.h;this.vy=0;}
    // Drift with boat while rising/falling near it
    if(logBoat&&this.x>logBoat.x-80&&this.x<logBoat.x+logBoat.w+80)this.x+=logBoat.vx;
    // Stay on boat + bounce at edges
    if(logBoat&&this.vy>=0&&this.bottom>=logBoat.y&&this.bottom<=logBoat.y+MAX_VY&&this.right>logBoat.x&&this.left<logBoat.x+logBoat.w){
      this.y=logBoat.y-this.h;this.vy=0;this.x+=logBoat.vx;
      if(this.left<logBoat.x+6)this.vx=Math.abs(this.vx)||0.8;
      if(this.right>logBoat.x+logBoat.w-6)this.vx=-(Math.abs(this.vx)||0.8);
    }
    if(this.x<0||this.right>WORLD_W)this.vx*=-1;
    if(!player.dead&&overlap(player,this)){this.alive=false;player.gainPower(this.type);updateHUD();}
  }
  draw(){
    if(!this.alive)return;
    const sx=this.x-camX,sy=this.y,r=16;
    if(this.type==='apple'){
      cx.fillStyle='#6D4C41';cx.strokeStyle='#4E342E';cx.lineWidth=2;cx.beginPath();cx.arc(sx+r,sy+r+4,r,0,Math.PI*2);cx.fill();cx.stroke();
      cx.strokeStyle='#795548';cx.lineWidth=2;cx.beginPath();cx.moveTo(sx+r,sy+4);cx.quadraticCurveTo(sx+r+6,sy-3,sx+r+9,sy+2);cx.stroke();
      cx.fillStyle='#FFCCBC';cx.beginPath();cx.arc(sx+r+11,sy+r,9,0,Math.PI*2);cx.fill();
      cx.fillStyle='#795548';cx.font='bold 10px serif';cx.textAlign='center';cx.fillText('x.x',sx+r-2,sy+r+7);
    }else if(this.type==='water'){
      const g=cx.createRadialGradient(sx+r-3,sy+r-3,2,sx+r,sy+r,r);g.addColorStop(0,'#81D4FA');g.addColorStop(1,'#0277BD');
      cx.fillStyle=g;cx.strokeStyle='#01579B';cx.lineWidth=2;
      cx.beginPath();cx.moveTo(sx+r,sy);cx.bezierCurveTo(sx+r+14,sy+9,sx+r+16,sy+22,sx+r,sy+32);cx.bezierCurveTo(sx+r-16,sy+22,sx+r-14,sy+9,sx+r,sy);cx.closePath();cx.fill();cx.stroke();
      cx.fillStyle='rgba(255,255,255,.7)';cx.beginPath();cx.ellipse(sx+r-6,sy+11,3.5,6,-.5,0,Math.PI*2);cx.fill();
    }else if(this.type==='sun'){
      for(let i=0;i<8;i++){const a=(Math.PI*2/8)*i+tick*.05;cx.strokeStyle='#FFD600';cx.lineWidth=2.5;cx.beginPath();cx.moveTo(sx+r+Math.cos(a)*(r+2),sy+r+Math.sin(a)*(r+2));cx.lineTo(sx+r+Math.cos(a)*(r+10),sy+r+Math.sin(a)*(r+10));cx.stroke();}
      circle(sx+r,sy+r,r,'#FFEE58','#FBC02D',2);drawEyes(sx+r,sy+r-2);
    }
  }
}

// SEED

// BACKGROUNDS

  const sky=cx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#87CEEB');sky.addColorStop(.65,'#B0E3FF');sky.addColorStop(1,'#D4F5C0');cx.fillStyle=sky;cx.fillRect(0,0,W,H);

  for(let s=0;s<6;s++){const col2=[fax-32,fax+2,fax+39][s%3];const smy2=fay-98+[0,-14,0][s%3]-((tick*.55+s*24)%48);const al2=Math.max(0,.35-((tick*.55+s*24)%48)/48*.35);cx.fillStyle=`rgba(50,50,50,${al2})`;cx.beginPath();cx.arc(col2,smy2,5+s%3*2,0,Math.PI*2);cx.fill();}
  cx.shadowColor='#FF1744';cx.shadowBlur=7;cx.fillStyle='#D50000';

  cx.fillStyle=sg;cx.beginPath();cx.arc(sunX,88,68,0,Math.PI*2);cx.fill();
  cx.fillStyle='#FFEE58';cx.beginPath();cx.arc(sunX,88,30,0,Math.PI*2);cx.fill();

class Gator {
  // Slim gator – low horizontal dash, stays at water level, player MUST jump
  constructor(x,side){this.x=x;this.y=GY-4;this.w=90;this.h=28;this.side=side;this.vx=side==='right'?-9:12;this.vy=-7;this.alive=true;}
  get cx(){return this.x+this.w/2;}
  update(){
    this.vy=Math.min(this.vy+GRAV*.72,MAX_VY);this.x+=this.vx;this.y+=this.vy;
    if(this.y>GY+20)this.alive=false;
    if(!player.dead&&this.y<GY+10&&player.bottom>this.y&&player.bottom<this.y+this.h+10&&player.right>this.x+4&&player.left<this.x+this.w-4&&player.inv<=0&&player.form!=='sun')player.takeDamage();

    // Teeth
    cx.fillStyle='rgba(255,255,255,.9)';for(let t=0;t<4;t++){const tx=snx+(this.vx<0?t*3.2:8-t*3.2);cx.beginPath();cx.moveTo(tx,sy+10);cx.lineTo(tx+3,sy+17);cx.lineTo(tx+6,sy+10);cx.fill();}
    // Goggles (pink, larger)
    const gx=this.vx<0?sx+9:sx+this.w-36;
    cx.fillStyle='#FCE4EC';cx.strokeStyle='#F06292';cx.lineWidth=2;cx.beginPath();cx.roundRect(gx,sy+3,27,16,4);cx.fill();cx.stroke();
    cx.fillStyle='rgba(255,255,255,.7)';cx.beginPath();cx.roundRect(gx+2,sy+5,8,11,2);cx.fill();cx.beginPath();cx.roundRect(gx+15,sy+5,8,11,2);cx.fill();

}

// Lurker Bird – stays on screen, drops enemies onto boat
class GoggleBird{
  constructor(){this.screenX=W*.6;this.y=90;this.w=44;this.h=30;this.alive=true;this.flapT=0;this.dropCd=220;this.targetSX=W*.6;this.slot=1;}
  get x(){return camX+this.screenX;}
  update(){
    this.flapT+=.18;
    // Sweep smoothly to target slot, then drop
    this.screenX+=(this.targetSX-this.screenX)*0.04;
    this.y=85+Math.sin(tick*.022)*28;
    // When near target, start drop countdown
    if(Math.abs(this.screenX-this.targetSX)<12&&this.dropCd>30)this.dropCd=30;
    this.dropCd--;
    if(this.dropCd<=0){
      const boatEnemies=enemies.filter(e=>(e instanceof Bottle||e instanceof Wrapper)&&e.alive&&logBoat&&e.x>logBoat.x-20&&e.x<logBoat.x+logBoat.w+20).length;
      if(boatEnemies<3&&logBoat){
        // Drop at current bird screen position, mapped to boat world coords
        const birdWorldX=camX+this.screenX;
        // Clamp to boat range
        const tx=Math.max(logBoat.x+30,Math.min(logBoat.x+logBoat.w-30,birdWorldX));
        const drop=Math.random()>.5?new Bottle(tx):new Wrapper(tx);
        drop.y=this.y+35;drop.vy=1;
        drop.vx=(Math.random()>.5?1:-1)*(0.8+Math.random()*0.7);
        enemies.push(drop);
      }
      // Pick new slot target for next drop
      this.slot=(this.slot+1)%3;
      const slotOffsets=[0.35,0.5,0.65]; // boat left, center, right in screen
      this.targetSX=W*slotOffsets[this.slot];
      this.dropCd=Math.floor(200+Math.random()*130);
    }
    if(this.x<-130||!logBoat)return; // safety
    if(!player.dead&&player.right>this.x+4&&player.left<this.x+this.w-4&&player.bottom>this.y+4&&player.top<this.y+this.h-4&&player.inv<=0&&player.form!=='sun')player.takeDamage();
  }
  draw(){
    const sx=camX+this.screenX-camX,sy=this.y; // sx = screenX directly
    const wf=Math.sin(this.flapT)*13;cx.save();
    cx.fillStyle='#455A64';cx.beginPath();cx.ellipse(sx+22,sy+15+wf*.5,this.w/2,10,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#546E7A';cx.strokeStyle='#37474F';cx.lineWidth=1.5;cx.beginPath();cx.ellipse(sx+24,sy+16,18,12,0,0,Math.PI*2);cx.fill();cx.stroke();
    cx.beginPath();cx.ellipse(sx+9,sy+8,10,9,-.1,0,Math.PI*2);cx.fill();cx.stroke();
    cx.fillStyle='#FFCA28';cx.beginPath();cx.moveTo(sx,sy+9);cx.lineTo(sx-11,sy+7);cx.lineTo(sx,sy+13);cx.fill();
    cx.fillStyle='#E0F7FA';cx.strokeStyle='#00BCD4';cx.lineWidth=1.5;cx.beginPath();cx.roundRect(sx+2,sy+1,19,13,3);cx.fill();cx.stroke();
    cx.fillStyle='rgba(180,240,255,.75)';cx.beginPath();cx.roundRect(sx+3,sy+3,6,9,2);cx.fill();cx.beginPath();cx.roundRect(sx+12,sy+3,5,9,2);cx.fill();
    cx.fillStyle='#D50000';cx.beginPath();cx.arc(sx+6,sy+7.5,2.2,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(sx+14.5,sy+7.5,2.2,0,Math.PI*2);cx.fill();
    if(this.dropCd<40){cx.strokeStyle=`rgba(255,80,0,${1-this.dropCd/40})`;cx.lineWidth=2;cx.setLineDash([4,4]);cx.beginPath();cx.moveTo(sx+22,sy+30);cx.lineTo(sx+22,sy+65);cx.stroke();cx.setLineDash([]);}
    cx.restore();
  }
}

function drawBGL2(){
  const prog=Math.min(camX/7000,1);lvl2prog=prog;
  // Sky: blue(100,181,246) → very dark grey(38,38,44)
  const r=Math.round(100-prog*62),g2=Math.round(181-prog*143),b=Math.round(246-prog*202);
  const sky=cx.createLinearGradient(0,0,0,GY);sky.addColorStop(0,`rgb(${r},${g2},${b})`);sky.addColorStop(1,`rgb(${Math.min(r+40,255)},${Math.min(g2+20,255)},${Math.min(b+20,255)})`);
  cx.fillStyle=sky;cx.fillRect(0,0,W,GY);
  // Storm clouds – grow darker and more opaque as prog increases
  clouds.forEach(c=>{const px=c.x-camX*.22;if(px<-c.w-50||px>W+50)return;const grey=Math.round(160-prog*110);cx.fillStyle=`rgba(${grey},${grey},${grey+5},${.35+prog*.5})`;cx.beginPath();cx.ellipse(px,c.y,c.w/2,c.w/5,0,0,Math.PI*2);cx.fill();});
  // (factory island appears at actual end-of-level, not in scrolling bg)
  // Ocean water (darkens)
  // Water: deep blue(0,50,140) → murky green(20,65,30)
  const wr=Math.round(prog*20),wg=Math.round(50+prog*15),wb=Math.round(140-prog*110);
  const waterG=cx.createLinearGradient(0,GY,0,H);waterG.addColorStop(0,`rgb(${wr},${wg},${wb})`);waterG.addColorStop(1,`rgb(${Math.max(0,wr-8)},${Math.max(0,wg-18)},${Math.max(0,wb-28)})`);
  cx.fillStyle=waterG;cx.fillRect(0,GY,W,H-GY);
  // Waves
  cx.strokeStyle=`rgba(255,255,255,${.08+prog*.05})`;cx.lineWidth=2;
  for(let w=0;w<6;w++){
    cx.beginPath();
    for(let wx=0;wx<=W+25;wx+=20){
      cx.lineTo(wx,GY+5+w*7+Math.sin(wx*.06+tick*.05+w*1.5)*5);
    }
    cx.stroke();
  }
  // Trash in water (increases)
  const trashN=Math.floor(prog*45)+5;
  for(let t=0;t<trashN;t++){
    const tx=((t*181+tick*.38)%(W+200))-100;const ty=GY+10+((t*47)%60);
    cx.fillStyle=['#EF9A9A','#90A4AE','#FFCC80','#CE93D8','#A5D6A7','#BDBDBD'][t%6];cx.strokeStyle='rgba(0,0,0,.15)';cx.lineWidth=1;
    if(t%3===0)cx.fillRect(tx,ty,Math.round(8+t%14),Math.round(5+t%8));
    else{cx.beginPath();cx.arc(tx,ty,3+t%6,0,Math.PI*2);cx.fill();}
  }
  // Foam/bubbles on surface
  cx.fillStyle='rgba(255,255,255,.25)';for(let f=0;f<18;f++){const fx=(f*82+tick*1.5)%(W+90)-45;cx.beginPath();cx.ellipse(fx,GY+4,12+f%5*4,4,0,0,Math.PI*2);cx.fill();}
}

  const lx=-camX,lw=510;if(lx>W||lx+lw<0)return;
  const dx=Math.max(lx,0),dw=Math.min(lx+lw,W)-dx;if(dw<=0)return;
  // Sand base (no flashy dots)
  cx.fillStyle='#D7CCC8';cx.fillRect(dx,GY,dw,H-GY);
  // Wet sand gradient at bottom (tides)
  const wet=cx.createLinearGradient(0,H-40,0,H);
  wet.addColorStop(0,'rgba(141,110,99,0)');wet.addColorStop(1,'rgba(141,110,99,0.5)');
  cx.fillStyle=wet;cx.fillRect(dx,H-40,dw,40);
  
  // Palm tree
  const ptx = lx + 200;
  if(ptx > dx-100 && ptx < dx+dw+100) {
    cx.save(); cx.translate(ptx, GY);
    // Trunk
    cx.fillStyle='#795548'; cx.beginPath(); cx.moveTo(-8, 0); cx.quadraticCurveTo(-15, -40, -3, -80); cx.lineTo(3, -80); cx.quadraticCurveTo(-5, -40, 8, 0); cx.fill();
    // Leaves
    cx.fillStyle='#4CAF50';
    for(let l=0; l<6; l++) {
      cx.save(); cx.translate(0, -80); cx.rotate(l*Math.PI*2/6);
      cx.beginPath(); cx.ellipse(25, 0, 30, 8, 0, 0, Math.PI*2); cx.fill();
      cx.restore();
    }
    // Coconuts
    cx.fillStyle='#5D4037'; cx.beginPath(); cx.arc(-8, -75, 6, 0, Math.PI*2); cx.arc(8, -75, 6, 0, Math.PI*2); cx.arc(0, -70, 6, 0, Math.PI*2); cx.fill();
    cx.restore();
  }
}

// MAIN LOOP
function loop(){
  requestAnimationFrame(loop);tick++;cx.clearRect(0,0,W,H);
  if(gs==='menu'){
    drawMenu();
    if(pressed('Space')||pressed('KeyZ')){gs='play';initL3();updateHUD();} // PLAYTEST: starts L3
    Object.assign(PK,K);return;
  }
  if(typeof logBoat!='undefined'&&logBoat){
    drawBGL2();drawL2Land();drawLogBoat();
  } else if(currentLevel === 3) {
    // ══ L3 PHYSICS ══
    if(gs==='play'){
      const sp=(K['ShiftLeft']||K['ShiftRight'])&&player.onGr?SPRINT:PSPD;
      if(K['ArrowLeft']||K['KeyA']){player.vx=-sp;player.facingR=false;if(player.onGr)player.walkC+=.18;}
      else if(K['ArrowRight']||K['KeyD']){player.vx=sp;player.facingR=true;if(player.onGr)player.walkC+=.18;}
      else player.vx*=.75;
      // Jump / double jump (identical to L1/L2)
      if(pressed('Space')||pressed('KeyZ')||pressed('ArrowUp')){
        if(player.onGr){player.vy=JF;player.onGr=false;player.jumps=1;}
        else if(player.jumps===1){player.vy=JF2;player.jumps=2;burst(player.cx,player.bottom,'#A5D6A7',5);}
      }
      if(pressed('KeyX')&&player.form==='water'&&player.wc<=0){player.shootWater();player.wc=25;}
      if(player.wc>0)player.wc--;
      player.vy=clamp(player.vy+GRAV,-99,MAX_VY);
      player.x=clamp(player.x+player.vx,0,W-player.w);
      player.y+=player.vy;
      if(player.inv>0)player.inv--;
    }
    // ══ L3 COLLISION ══
    player.onGr=false;
    for(const p of platforms){
      if(player.right<=p.x||player.left>=p.x+p.w)continue;
      if(p.isWinstonPipe)continue;
      if(player.vy>=0&&player.bottom>=p.y&&player.bottom<=p.y+p.h+MAX_VY+4&&player.y<p.y){
        player.y=p.y-player.h;player.vy=0;player.onGr=true;player.jumps=0;
      }
      if(player.vy<0&&player.top<=p.y+p.h&&player.top>=p.y-2&&player.bottom>p.y){
        player.y=p.y+p.h;player.vy=0;
      }
    }
    if(player.y>L3_WORLD_BOTTOM+120&&!player.dead)player.die();
    // ══ L3 CAMERA ══
    camX=0;
    l3CamY=clamp(l3CamY+(player.y-H*.55-l3CamY)*.1,0,L3_WORLD_BOTTOM-H+100);
    checkL3BossSpawn();
    // ══ L3 DRAW BACKGROUND ══
    drawBGL3();
    // ══ L3 DRAW WORLD (vertical camera) ══
    cx.save();cx.translate(0,-l3CamY);
    // Platforms
    platforms.forEach(p=>{
      const sy=p.y,sx=p.x;
      if(sy-l3CamY>H+40||sy+p.h-l3CamY<-40)return;
      if(p.isFloor||p.isBossHall){
        cx.fillStyle='#1C2A2A';cx.fillRect(sx,sy,p.w,400);
        cx.fillStyle='#455A64';cx.fillRect(sx,sy,p.w,p.h);
        cx.fillStyle='#546E7A';cx.fillRect(sx,sy,p.w,6);
        cx.fillStyle='#263238';cx.fillRect(sx,sy+p.h-2,p.w,2);
        for(let gx=0;gx<p.w;gx+=80){cx.fillStyle='rgba(255,150,0,0.2)';cx.fillRect(sx+gx,sy,40,6);}
        // Entry door (bottom floor only) - LARGE INDUSTRIAL FACTORY DOORS
        if(p.isFloor){
          const dw=380, dh=200; // wide double doors
          const dx=sx+W/2-dw/2, dy=sy-dh;
          // Door frame / wall surround
          cx.fillStyle='#1a2020';
          cx.fillRect(dx-20,dy-20,dw+40,dh+20);
          cx.strokeStyle='#37474F';cx.lineWidth=4;
          cx.strokeRect(dx-20,dy-20,dw+40,dh+20);
          // LEFT door panel (slightly ajar/open inward for depth)
          cx.fillStyle='#2C3A3A';
          cx.beginPath();cx.moveTo(dx,dy);cx.lineTo(dx+dw/2-8,dy);cx.lineTo(dx+dw/2-8,sy);cx.lineTo(dx,sy);cx.closePath();cx.fill();
          // LEFT door detail
          cx.strokeStyle='#455A64';cx.lineWidth=2;
          // Horizontal rails
          for(const ry of [dy+30,dy+90,dy+150]){cx.beginPath();cx.moveTo(dx+4,ry);cx.lineTo(dx+dw/2-12,ry);cx.stroke();}
          // Vertical stiffeners
          for(const rx of [dx+50,dx+100,dx+140]){cx.beginPath();cx.moveTo(rx,dy+4);cx.lineTo(rx,sy-4);cx.stroke();}
          // Rivets on left door
          cx.fillStyle='#546E7A';
          [[dx+12,dy+12],[dx+12,dy+72],[dx+12,dy+132],[dx+dw/2-20,dy+12],[dx+dw/2-20,dy+72],[dx+dw/2-20,dy+132]].forEach(([rx,ry])=>{cx.beginPath();cx.arc(rx,ry,4,0,Math.PI*2);cx.fill();});
          // Warning stripe on left door (diagonal yellow/black)
          cx.save();cx.beginPath();cx.rect(dx+4,sy-28,dw/2-14,24);cx.clip();
          for(let i=-10;i<dw/2;i+=20){cx.fillStyle=i%40<20?'rgba(255,180,0,0.5)':'rgba(0,0,0,0.5)';cx.beginPath();cx.moveTo(dx+4+i,sy-28);cx.lineTo(dx+4+i+20,sy-28);cx.lineTo(dx+4+i+20-8,sy-4);cx.lineTo(dx+4+i-8,sy-4);cx.closePath();cx.fill();}
          cx.restore();

          // RIGHT door panel
          cx.fillStyle='#2A3838';
          cx.beginPath();cx.moveTo(dx+dw/2+8,dy);cx.lineTo(dx+dw,dy);cx.lineTo(dx+dw,sy);cx.lineTo(dx+dw/2+8,sy);cx.closePath();cx.fill();
          // RIGHT door detail
          cx.strokeStyle='#455A64';cx.lineWidth=2;
          for(const ry of [dy+30,dy+90,dy+150]){cx.beginPath();cx.moveTo(dx+dw/2+12,ry);cx.lineTo(dx+dw-4,ry);cx.stroke();}
          for(const rx of [dx+dw/2+50,dx+dw/2+100,dx+dw/2+140]){cx.beginPath();cx.moveTo(rx,dy+4);cx.lineTo(rx,sy-4);cx.stroke();}
          cx.fillStyle='#546E7A';
          [[dx+dw/2+18,dy+12],[dx+dw/2+18,dy+72],[dx+dw/2+18,dy+132],[dx+dw-14,dy+12],[dx+dw-14,dy+72],[dx+dw-14,dy+132]].forEach(([rx,ry])=>{cx.beginPath();cx.arc(rx,ry,4,0,Math.PI*2);cx.fill();});
          // Warning stripe on right door
          cx.save();cx.beginPath();cx.rect(dx+dw/2+8,sy-28,dw/2-14,24);cx.clip();
          for(let i=-10;i<dw/2;i+=20){cx.fillStyle=i%40<20?'rgba(255,180,0,0.5)':'rgba(0,0,0,0.5)';cx.beginPath();cx.moveTo(dx+dw/2+8+i,sy-28);cx.lineTo(dx+dw/2+8+i+20,sy-28);cx.lineTo(dx+dw/2+8+i+20-8,sy-4);cx.lineTo(dx+dw/2+8+i-8,sy-4);cx.closePath();cx.fill();}
          cx.restore();

          // Door gap (dark center gap)
          cx.fillStyle='#050a0a';cx.fillRect(dx+dw/2-8,dy,16,dh);
          // Top frame above doors
          cx.fillStyle='#263238';cx.fillRect(dx-20,dy-20,dw+40,20);
          cx.strokeStyle='#455A64';cx.lineWidth=1;cx.strokeRect(dx-20,dy-20,dw+40,20);
          // "THE FACTORY" industrial sign
          cx.fillStyle='#B71C1C';cx.fillRect(dx+dw/2-80,dy-42,160,20);
          cx.strokeStyle='#FF1744';cx.lineWidth=2;cx.strokeRect(dx+dw/2-80,dy-42,160,20);
          cx.fillStyle='#fff';cx.font='bold 11px monospace';cx.textAlign='center';
          cx.fillText('THE  FACTORY',dx+dw/2,dy-28);
          // Industrial warning lights (flicker)
          const fl=0.6+Math.sin(tick*.25)*0.4;
          [[dx-5,dy-10],[dx+dw+5,dy-10]].forEach(([lx,ly])=>{
            cx.fillStyle=`rgba(255,80,0,${fl})`;cx.beginPath();cx.arc(lx,ly,8,0,Math.PI*2);cx.fill();
            cx.fillStyle=`rgba(255,140,0,${fl*.6})`;cx.beginPath();cx.arc(lx,ly,14,0,Math.PI*2);cx.fill();
          });
        }
        if(p.isBossHall){
          const dx=W/2-65,dy=sy-170;
          cx.fillStyle='#1a0000';cx.fillRect(dx,dy,130,170);
          cx.strokeStyle='#B71C1C';cx.lineWidth=5;cx.strokeRect(dx,dy,130,170);
          cx.fillStyle='#7F0000';cx.fillRect(dx,dy,62,170);cx.fillRect(dx+68,dy,62,170);
          cx.fillStyle='#FF1744';cx.beginPath();cx.arc(dx+50,dy+90,7,0,Math.PI*2);cx.fill();
          cx.beginPath();cx.arc(dx+80,dy+90,7,0,Math.PI*2);cx.fill();
          // Torches
          for(const tx of [dx-25,dx+145]){
            cx.fillStyle='#4E342E';cx.fillRect(tx,dy+20,10,45);
            cx.fillStyle=`rgba(255,${120+Math.sin(tick*.3)*40},0,.9)`;
            cx.beginPath();cx.arc(tx+5,dy+14+Math.sin(tick*.4)*3,12,0,Math.PI*2);cx.fill();
            cx.fillStyle='rgba(255,240,0,.7)';cx.beginPath();cx.arc(tx+5,dy+10+Math.sin(tick*.4)*3,6,0,Math.PI*2);cx.fill();
          }
        }
      } else if(p.isSeedmanPipe){
        cx.fillStyle='#1C2A30';cx.fillRect(sx,sy,p.w,p.h+300);
        cx.fillStyle='#263238';cx.fillRect(sx,sy,p.w,p.h);
        cx.fillStyle='#37474F';cx.fillRect(sx,sy,p.w,10);
        cx.strokeStyle='#455A64';cx.lineWidth=1;
        for(let gr=30;gr<p.h;gr+=30){cx.beginPath();cx.moveTo(sx,sy+gr);cx.lineTo(sx+p.w,sy+gr);cx.stroke();}
      } else if(p.isWinstonPipe){
        cx.fillStyle='#1C2A30';cx.fillRect(sx,sy,p.w,p.h+300);
        cx.fillStyle='#263238';cx.fillRect(sx,sy,p.w,p.h);
        cx.fillStyle='#37474F';cx.fillRect(sx,sy,p.w,10);
      } else {
        cx.fillStyle='#455A64';cx.fillRect(sx,sy,p.w,p.h);
        cx.fillStyle='#546E7A';cx.fillRect(sx,sy,p.w,6);
        cx.fillStyle='#263238';cx.fillRect(sx,sy+p.h-2,p.w,2);
        for(const bx of [sx+6,sx+p.w-8]){cx.fillStyle='#37474F';cx.strokeStyle='#1C2A2A';cx.lineWidth=1;cx.beginPath();cx.arc(bx,sy+p.h/2,3,0,Math.PI*2);cx.fill();cx.stroke();}
        cx.strokeStyle='#1C2A2A';cx.lineWidth=1;cx.strokeRect(sx,sy,p.w,p.h);
      }
    });
    // Enemies
    enemies.forEach(e=>{if(!e.alive&&!(e.sqT>0)&&!e.exploding)return;if(e===l3Winston)return;e.update();e.draw();});
    // Winston boss
    if(l3Winston&&l3Winston.alive){l3Winston.update();l3Winston.draw();if(winstonBattleStarted)winstonTimer++;}
    // Pickups
    pickups.forEach(p=>{if(!p.alive)return;p.vy=clamp((p.vy||0)+GRAV,-99,MAX_VY);p.y+=p.vy;
      for(const pl of platforms){if(p.y+18>=pl.y&&p.y<pl.y&&p.x+18>pl.x&&p.x<pl.x+pl.w){p.y=pl.y-18;p.vy=0;break;}}
      if(player&&!player.dead&&p.alive&&overlap(player,p)){p.alive=false;player.gainPower(p.type);updateHUD();}
      if(p.y-l3CamY>-80&&p.y-l3CamY<H+80){const oy=p.y;p.y=p.y;p.draw();p.y=oy;}
    });
    pickups=pickups.filter(p=>p.alive);
    // Seeds
    seedItems.forEach(s=>{s.update();if(s.alive&&s.y-l3CamY>-20&&s.y-l3CamY<H+20){const bob=Math.sin(tick*.1)*2;cx.fillStyle='#CDDC39';cx.strokeStyle='#827717';cx.lineWidth=1.5;cx.beginPath();cx.ellipse(s.x+6,s.y+6+bob,6,4,.4,0,Math.PI*2);cx.fill();cx.stroke();}});
    // Fire pipes
    l3Pipes.forEach(pipe=>{
      pipe.cd--;
      if(pipe.cd<=0&&!pipe.firing&&!pipe.warn){pipe.warn=true;pipe.warnT=120;}
      if(pipe.warn){if(--pipe.warnT<=0){pipe.warn=false;pipe.firing=true;pipe.fireT=40;}}
      if(pipe.firing&&--pipe.fireT<=0){pipe.firing=false;pipe.cd=180+Math.floor(Math.random()*200);}
      const sy=pipe.y,px2=pipe.side==='left'?0:W-pipe.len;
      if(sy-l3CamY<-30||sy-l3CamY>H+30)return;
      cx.fillStyle='#455A64';cx.strokeStyle='#263238';cx.lineWidth=2;
      cx.beginPath();cx.roundRect(px2,sy-12,pipe.len,24,pipe.side==='left'?[0,8,8,0]:[8,0,0,8]);cx.fill();cx.stroke();
      if(pipe.warn){const fx=pipe.side==='left'?pipe.len+8:W-pipe.len-8;cx.fillStyle=`rgba(255,100,0,${.5+Math.sin(tick*.5)*.3})`;cx.beginPath();cx.arc(fx,sy,10,0,Math.PI*2);cx.fill();}
      if(pipe.firing){const fx=pipe.side==='left'?pipe.len:W-pipe.len;const dir=pipe.side==='left'?1:-1;cx.shadowColor='#FF6F00';cx.shadowBlur=16;cx.fillStyle='rgba(255,120,0,.85)';cx.beginPath();cx.ellipse(fx+dir*45,sy,45,14,0,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
        if(player&&!player.dead&&player.inv<=0&&Math.abs(player.y+26-sy)<28&&Math.abs(player.x+14-fx)<80)player.takeDamage();}
    });
    // Player
    if(gs==='play'||gs==='dead'){const oc=camX;camX=0;player.draw();camX=oc;}
    cx.restore();
    // Projectiles
    if(gs==='play'){
      projs.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.3;p.life--;
        const sx3=p.x,sy3=p.y-l3CamY;if(sy3<-30||sy3>H+30)return;
        if(p.type==='water'){const g=cx.createRadialGradient(sx3,sy3,1,sx3,sy3,10);g.addColorStop(0,'rgba(100,200,255,.9)');g.addColorStop(1,'rgba(0,100,255,0)');cx.fillStyle=g;cx.beginPath();cx.arc(sx3,sy3,10,0,Math.PI*2);cx.fill();circle(sx3,sy3,5,'#29B6F6','#0277BD',1.5);
          enemies.forEach(e=>{if(!e.alive)return;if(Math.abs(p.x-e.x-16)<28&&Math.abs(p.y-e.y-18)<28){e.kill?e.kill():(e.alive=false);score+=150;burst(e.x+16,e.y,'#29B6F6',8);p.life=0;}});}
        if(p.type==='coal'){cx.fillStyle='#212121';cx.beginPath();cx.arc(sx3,sy3,5,0,Math.PI*2);cx.fill();

    const al=Math.min(1,cutTimer/45);cx.globalAlpha=al;cx.textAlign='center';
    cx.font='900 88px Impact,Arial Black,sans-serif';
    let fg2=cx.createLinearGradient(0,H/2-40,0,H/2+30);

    cx.globalAlpha=1;

  }

  // Overlays
  if(gs==='dead'&&!player.dead)gs='play';

  if(gs==='over'){drawOverlay('💀 Game Over',`Score: ${score}`,'#FF5252');if(pressed('Space')||pressed('KeyZ')){score=0;lives=3;seeds=0;gs='play';initLevel();updateHUD();}}
  if(gs==='win'){
    if(currentLevel < 3) {
      drawOverlay('🎉 You Win!',`Score: ${score}`,'#FFD700');
      if(pressed('Space')||pressed('KeyZ')){score=0;lives=3;seeds=0;initLevel();updateHUD();}
    } else {

  if(typeof logBoat!=='undefined'&&logBoat){

    if(!logBoat.moving&&player.bottom>=logBoat.y&&player.bottom<=logBoat.y+MAX_VY&&player.right>logBoat.x&&player.left<logBoat.x+logBoat.w)logBoat.moving=true;

    if(cutState==='l2end'){logBoat.vx=Math.max(0,logBoat.vx-0.06);logBoat.x+=logBoat.vx;}
    // Enemy spawning
    if(logBoat.moving&&logBoat.x>600&&cutState!=='l2end'){
      spawnTick++;
      const prog2=Math.min(logBoat.x/6200,1);
      // Single lurker bird spawns once when boat far enough
      if(logBoat.x>1200&&!enemies.some(e=>e instanceof GoggleBird)){
        enemies.push(new GoggleBird());
      }
      // Gators: progressive, start at 2500, get more frequent
      const gatorInt=Math.round(450-prog2*200);
      if(logBoat.x>2500&&spawnTick%gatorInt===0){
        const side=Math.random()>.5?'right':'left';
        const gx=side==='right'?logBoat.x+logBoat.w+100:logBoat.x-100;
        enemies.push(new GatorWarning(gx,side));

      if(logBoat.x>1000&&spawnTick%260===0&&Math.random()>.4){

    if(logBoat.moving)camX=clamp(logBoat.x+logBoat.w/2-W/2,0,8000-W);
  }
  if(gs==='play')updateHUD();
  enemies=enemies.filter(e=>e.alive||(e.sqT!==undefined&&e.sqT>0));
  Object.assign(PK,K);
}
loop();

class OilTank {
  constructor(x, y) {
    this.x = x; this.y = y; this.w = 38; this.h = 44;
    this.vx = 0; this.vy = 0; this.alive = true;

  update() {
    if (!this.alive && !this.exploding) return;
    if (this.exploding) {
      this.explodeR += 4; this.explodeT++;
      // Damage player in explosion radius
      if (player && !player.dead && this.explodeT < 20) {
        const dx = player.cx - this.cx, dy = player.cy - (this.y+this.h/2);
        if (Math.sqrt(dx*dx+dy*dy) < this.explodeR && player.inv <= 0 && player.form !== 'sun')
          player.takeDamage();
      }
      if (this.explodeT > 40) { this.alive = false; this.exploding = false; }
      return;
    }
    this.vy = clamp(this.vy + GRAV, -99, MAX_VY);
    this.x += this.vx; this.y += this.vy;
    this.onGr = false;
    for (const p of platforms) {
      if (this.right <= p.x || this.left >= p.x+p.w) continue;
      if (this.vy >= 0 && this.bottom >= p.y && this.bottom <= p.y+p.h+MAX_VY && this.y < p.y) {
        this.y = p.y - this.h; this.vy = 0; this.onGr = true;
      }
    }
    // Proximity check – start flashing if near player
    if (player && !player.dead) {
      const dx = player.cx - this.cx, dy = player.cy - (this.y+this.h/2);
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < 90) { this.flashT++; if (this.flashT > 120) { this.exploding = true; this.explodeT = 0; burst(this.cx, this.y, '#FF6F00', 16); } }
      else this.flashT = Math.max(0, this.flashT - 1);
      // Water kills it safely
    }
  }
  kill() { if (!this.exploding) { this.alive = false; burst(this.cx, this.y, '#FF6F00', 10); score += 200; } }
  draw() {
    if (!this.alive && !this.exploding) return;
    if (this.exploding) {
      const r = this.explodeR, sx = this.cx - camX;
      const g = cx.createRadialGradient(sx, this.y+this.h/2, 2, sx, this.y+this.h/2, r);
      g.addColorStop(0, 'rgba(255,200,0,0.9)'); g.addColorStop(0.5, 'rgba(255,80,0,0.6)'); g.addColorStop(1, 'rgba(255,0,0,0)');
      cx.fillStyle = g; cx.beginPath(); cx.arc(sx, this.y+this.h/2, r, 0, Math.PI*2); cx.fill();
      return;
    }
    const sx = this.x - camX, flash = this.flashT > 0 && Math.floor(tick/4)%2===0;

    cx.strokeStyle = '#7F0000'; cx.lineWidth = 2.5;

class Winston {
  constructor() {
    // Boss stands on the smaller right pipe
    this.w = 90; this.h = 130;
    this.x = L3_BOSS_PIPE_R_X + L3_BOSS_PIPE_R_W/2 - this.w/2;
    this.y = L3_BOSS_PIPE_R_Y - this.h;
    this.alive = true; this.enraged = false;
    this.attackTimer = 0; this.attackPhase = 0;
    this.smokeZones = []; // active: {zone:0|1|2, life}
    this.coins = []; // active thrown coins
    this.eyeRed = false;
    this.shakeMag = 0;
    // Pre-fight dialogue
    this.dialogueState = 'pre'; // 'pre','fighting','enraged_dialogue','fighting2'
    this.dialogueTimer = 0;
    this.dialogueText = '';
    this.enrageCooldown = 0;
    this.attackInterval = 220; // frames between attacks
  }
  get cx() { return this.x + this.w/2; }
  get cy() { return this.y + this.h/2; }

  update() {
    if (!this.alive) return;
    this.dialogueTimer++;
    this.attackTimer++;
    this.enrageCooldown = Math.max(0, this.enrageCooldown - 1);

    // Dialogue states
    if (this.dialogueState === 'pre') {
      if (this.dialogueTimer > 180) { this.dialogueText = '"You can\'t stop me!"'; }
      if (this.dialogueTimer > 420) { this.dialogueState = 'fighting'; this.dialogueTimer = 0; this.dialogueText = ''; winstonBattleStarted = true; }
      return;
    }

    // Phase 2 trigger at 60s
    if (!this.enraged && winstonBattleStarted && winstonTimer >= 60*60) {
      this.enraged = true; this.dialogueState = 'enraged_dialogue';
      this.dialogueTimer = 0; this.attackInterval = 140; this.dialogueText = '"YOU WILL PAY!"';
      this.eyeRed = true;
    }
    if (this.dialogueState === 'enraged_dialogue' && this.dialogueTimer > 300) {
      this.dialogueState = 'fighting2'; this.dialogueText = '';
    }
    if (this.dialogueState === 'enraged_dialogue') return;

    // Attacks
    if (this.attackTimer >= this.attackInterval) {
      this.attackTimer = 0;
      this.attackPhase++;
      this._doAttack();
      // Speed up over time
      this.attackInterval = Math.max(this.enraged ? 80 : 140, this.attackInterval - 5);
    }

    // Update coins
    this.coins = this.coins.filter(c => c.alive);
    this.coins.forEach(c => {
      c.vx *= 0.99; c.x += c.vx;
      c.rot += c.vx * 0.04;
      if (c.x < L3_SEEDMAN_PIPE_X) { c.alive = false; return; }
      if (c.x + c.r*2 > L3_SEEDMAN_PIPE_X + L3_SEEDMAN_PIPE_W) { c.alive = false; return; }
      if (player && !player.dead && overlap(player, {x:c.x-c.r,y:c.y-c.r,w:c.r*2,h:c.r*2}) && player.inv <= 0 && player.form !== 'sun')
        player.takeDamage();
    });

    // Smoke zone timeout
    this.smokeZones = this.smokeZones.filter(z => z.life-- > 0);
    this.smokeZones.forEach(z => {
      if (player && !player.dead && player.inv <= 0 && player.form !== 'sun') {
        const pipeX = L3_SEEDMAN_PIPE_X, pipeW = L3_SEEDMAN_PIPE_W, third = pipeW/3;
        const zoneX = pipeX + z.zone * third;
        if (player.x + player.w > zoneX && player.x < zoneX + third && player.bottom >= L3_SEEDMAN_PIPE_Y - 10)
          player.takeDamage();
      }
    });

    // Shake during enraged
    if (this.enraged) this.shakeMag = 3;
    else this.shakeMag = 0;
  }

  _doAttack() {
    const isEnraged = this.enraged;
    const roll = Math.random();

    // Smoke attack
    if (roll < (isEnraged ? 0.55 : 0.65)) {
      const numZones = isEnraged && this.attackPhase > 6 ? 2 : 1;
      const zones = [0,1,2];
      // Shuffle and pick numZones
      for(let i=zones.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[zones[i],zones[j]]=[zones[j],zones[i]];}
      for(let i=0;i<numZones;i++) {
        const zone = zones[i];
        // Warning particles first (180 frames = 3s before actual smoke)
        winstonSmokeWarnings.push({ zone, life: 120, warn: true });
        setTimeout(() => {
          this.smokeZones.push({ zone, life: 240 });
        }, 120 * (1000/60));
      }
    } else {
      // Coin attack
      const pipeX = L3_SEEDMAN_PIPE_X, pipeW = L3_SEEDMAN_PIPE_W;

    }
    // Moustache

    cx.beginPath(); cx.ellipse(sx+this.w/2+8, sy+this.h-80-headR, 9, 5, 0.2, 0, Math.PI*2); cx.fill();
    // Monocle

    cx.fillStyle = '#1a1a1a'; cx.fillRect(sx+this.w/2-34, sy+this.h-90-headR-headR+headR-4, 68, 10);
    // Hat band
    cx.fillStyle = '#B71C1C'; cx.fillRect(sx+this.w/2-26, sy+this.h-126-headR+42-42, 52, 7);

    // Dialogue bubble
    if (this.dialogueText) {

    if (this.enraged) {

      cx.shadowBlur = 0;
    }

    cx.restore();

    // Draw coins
    this.coins.forEach(c => {
      const cx2 = c.x - camX;
      cx.save(); cx.translate(cx2, c.y); cx.rotate(c.rot);
      const g = cx.createRadialGradient(-c.r/3, -c.r/3, 2, 0, 0, c.r);

      cx.fillStyle = '#E65100'; cx.font = `bold ${c.r}px serif`; cx.textAlign = 'center';
      cx.fillText('$', 0, c.r/3);
      cx.restore();
    });
  }
}

// Camera: l3CamY = world Y of top of screen
function updateL3Camera() {
  camX = 0;
  const targetY = player.y - H * 0.62;
  l3CamY += (targetY - l3CamY) * 0.1;
  l3CamY = Math.max(0, Math.min(l3CamY, L3_WORLD_BOTTOM - H + 20));
}

// Boss spawn trigger
function checkL3BossSpawn() {
  if(l3BossPhase || l3Winston) return;
  const onBoss = platforms.some(p=>(p.isBossHall||p.isSeedmanPipe)&&
    player.right>p.x&&player.left<p.x+p.w&&Math.abs(player.bottom-p.y)<40);
  if(onBoss){
    l3BossPhase=true;
    l3Winston=new Winston();
    enemies.push(l3Winston);
  }
}

function l3PlatformCollision() {
  if(!player||player.dead) return;
  player.onGr = false;
  for(const p of platforms) {
    if(player.right <= p.x || player.left >= p.x+p.w) continue;
    if(p.isWinstonPipe) continue; // forcefield – can't land on Winston's pipe
    // Land on top
    if(player.vy >= 0 && player.bottom >= p.y && player.bottom <= p.y+p.h+MAX_VY+2 && player.y < p.y) {
      player.y = p.y - player.h; player.vy = 0; player.onGr = true; player.jumps = 0;
    }
    // Ceiling bump
    if(player.vy < 0 && player.top <= p.y+p.h && player.top >= p.y && player.bottom > p.y) {
      player.y = p.y+p.h; player.vy = 0;
    }
  }
  if(player.y + player.h > L3_WORLD_BOTTOM + 80) player.die();
}

function drawL3Platforms() {
  platforms.forEach(p => {
    const sy = p.y, sx = p.x;  // called inside cx.translate(0,-l3CamY) - no manual offset needed

      // Thick metal floor

      cx.fillStyle='#37474F'; cx.fillRect(sx,sy,p.w,p.h);
      // Top highlight stripe
      cx.fillStyle='#546E7A'; cx.fillRect(sx,sy,p.w,8);

      for(let gx=0;gx<p.w;gx+=strW*2){cx.fillStyle='rgba(255,160,0,0.25)';cx.fillRect(sx+gx,sy,strW,8);}
      cx.strokeStyle='#263238'; cx.lineWidth=2; cx.strokeRect(sx,sy,p.w,p.h);
      // Bolts
      cx.fillStyle='#263238';
      for(let gx=20;gx<p.w;gx+=80){cx.beginPath();cx.arc(sx+gx,sy+p.h/2,4,0,Math.PI*2);cx.fill();}
      if(p.isBossHall) {
        const doorX=W/2-60,doorY=sy-160;
        cx.fillStyle='#1a0000'; cx.fillRect(doorX,doorY,120,160);
        cx.strokeStyle='#B71C1C'; cx.lineWidth=5; cx.strokeRect(doorX,doorY,120,160);
        cx.fillStyle='#7F0000'; cx.fillRect(doorX,doorY,58,160); cx.fillRect(doorX+62,doorY,58,160);
        cx.fillStyle='#C62828'; cx.beginPath(); cx.arc(doorX+48,doorY+80,6,0,Math.PI*2); cx.fill();
        cx.beginPath(); cx.arc(doorX+72,doorY+80,6,0,Math.PI*2); cx.fill();
        [-20,140].forEach(tx=>{
          const tx2=doorX+tx,ty2=doorY+20;
          cx.fillStyle='#5D4037'; cx.fillRect(tx2,ty2,10,40);
          const flk=Math.random()>.5?1:0;
          cx.fillStyle='rgba(255,150,0,0.9)'; cx.beginPath(); cx.arc(tx2+5,ty2-8+flk,10,0,Math.PI*2); cx.fill();
          cx.fillStyle='rgba(255,220,0,0.7)'; cx.beginPath(); cx.arc(tx2+5,ty2-12+flk,5,0,Math.PI*2); cx.fill();
        });
      }
    } else if(p.isSeedmanPipe) {
      cx.fillStyle='#1C2A30'; cx.fillRect(sx,sy,p.w,p.h);
      cx.fillStyle='#263238'; cx.fillRect(sx,sy,p.w,14);
      cx.strokeStyle='#37474F'; cx.lineWidth=2;
      for(let gr=30;gr<p.h;gr+=30){cx.beginPath();cx.moveTo(sx,sy+gr);cx.lineTo(sx+p.w,sy+gr);cx.stroke();}
    } else if(p.isWinstonPipe) {
      cx.fillStyle='#1C2A30'; cx.fillRect(sx,sy,p.w,p.h);
      cx.fillStyle='#263238'; cx.fillRect(sx,sy,p.w,14);
    } else {
      // Factory steel platform (Mario castle style)
      // Main body
      cx.fillStyle='#455A64'; cx.fillRect(sx,sy,p.w,p.h);
      // Top face (lighter)
      cx.fillStyle='#546E7A'; cx.fillRect(sx,sy,p.w,6);
      // Bottom shadow
      cx.fillStyle='#263238'; cx.fillRect(sx,sy+p.h-3,p.w,3);
      // Rivet bolts at ends
      cx.fillStyle='#37474F'; cx.strokeStyle='#1C2A2A'; cx.lineWidth=1;
      for(const bx of [sx+6,sx+p.w-8]){cx.beginPath();cx.arc(bx,sy+p.h/2,3,0,Math.PI*2);cx.fill();cx.stroke();}
      // Darker stripe
      cx.fillStyle='rgba(0,0,0,0.2)'; cx.fillRect(sx,sy+8,p.w,2);
      cx.strokeStyle='#1C2A2A'; cx.lineWidth=1; cx.strokeRect(sx,sy,p.w,p.h);
    }
  });
}

function updateDrawL3Pipes() {
  l3Pipes.forEach(pipe=>{
    pipe.cd--;
    if(pipe.cd<=0&&!pipe.firing&&!pipe.warn){pipe.warn=true;pipe.warnT=120;}
    if(pipe.warn){pipe.warnT--;if(pipe.warnT<=0){pipe.warn=false;pipe.firing=true;pipe.fireT=40;}}
    if(pipe.firing){
      pipe.fireT--;
      if(pipe.fireT<=0){pipe.firing=false;pipe.cd=180+Math.floor(Math.random()*200);}
      if(Math.random()<0.6){
        const dir=pipe.side==='left'?1:-1;
        const fx=pipe.side==='left'?pipe.len:W-pipe.len;
        l3FireParts.push({x:fx,y:pipe.y,vx:dir*(2+Math.random()*3),vy:(Math.random()-.5)*2,life:25,r:6+Math.random()*8});
      }
      if(player&&!player.dead&&player.inv<=0&&player.form!=='sun'){
        const fx=pipe.side==='left'?pipe.len:W-pipe.len;
        if(Math.abs(player.y+player.h/2-pipe.y)<30&&Math.abs(player.x+player.w/2-fx)<90) player.takeDamage();
      }
    }
    const sy=pipe.y-l3CamY; if(sy<-30||sy>H+30) return;
    const px=pipe.side==='left'?0:W-pipe.len;
    cx.fillStyle='#37474F';cx.strokeStyle='#263238';cx.lineWidth=2;
    cx.beginPath();cx.roundRect(px,sy-12,pipe.len,24,pipe.side==='left'?[0,8,8,0]:[8,0,0,8]);cx.fill();cx.stroke();
    if(pipe.warn){
      const flameX=pipe.side==='left'?pipe.len+10:W-pipe.len-10;
      const fl=Math.sin(tick*0.5)*3;
      cx.fillStyle=`rgba(255,120,0,${0.4+Math.sin(tick*0.3)*0.3})`;
      cx.beginPath();cx.arc(flameX,sy-4+fl,8,0,Math.PI*2);cx.fill();
    }
    if(pipe.firing){
      const fx2=pipe.side==='left'?pipe.len:W-pipe.len;
      const dir2=pipe.side==='left'?1:-1;
      cx.shadowColor='#FF6F00';cx.shadowBlur=20;
      cx.fillStyle=`rgba(255,${100+Math.floor(Math.random()*100)},0,0.85)`;
      cx.beginPath();cx.ellipse(fx2+dir2*50,sy,50,14+Math.random()*6,0,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;
    }
  });
  l3FireParts=l3FireParts.filter(p=>p.life>0);
  l3FireParts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    const sy2=p.y-l3CamY;
    cx.fillStyle=`rgba(255,${Math.floor(p.life*8)},0,${p.life/25})`;
    cx.beginPath();cx.arc(p.x,sy2,p.r*(p.life/25),0,Math.PI*2);cx.fill();
  });
}

function updateDrawL3PowerPipes() {
  l3PowerPipes.forEach(pp=>{
    pp.cd--;
    const sy=pp.y-l3CamY; if(sy<-60||sy>H+60){pp.cd=Math.min(pp.cd,0);return;}
    cx.fillStyle='#455A64';cx.strokeStyle='#263238';cx.lineWidth=2;
    cx.beginPath();cx.roundRect(pp.x-15,sy-20,30,40,6);cx.fill();cx.stroke();
    cx.fillStyle=pp.type==='water'?'#1565C0':pp.type==='sun'?'#F57F17':'#2E7D32';
    cx.beginPath();cx.roundRect(pp.x-10,sy-15,20,20,4);cx.fill();
    cx.fillStyle='#fff';cx.font='bold 12px serif';cx.textAlign='center';
    cx.fillText(pp.type==='water'?'💧':pp.type==='sun'?'☀️':'🌱',pp.x,sy+2);
    if(pp.cd<=0){
      pp.cd=500;
      const pu=new Pickup(pp.x-15,pp.y-50,pp.type);
      pu.vy=-6;pu.rising=false;pickups.push(pu);
    }
  });
}

function drawCoalProjectiles() {
  projs.forEach(p=>{
    if(p.type!=='coal') return;
    const sx=p.x, sy=p.y-l3CamY;
    cx.fillStyle='#212121';cx.strokeStyle='#000';cx.lineWidth=1;
    cx.beginPath();cx.arc(sx,sy,5,0,Math.PI*2);cx.fill();cx.stroke();
    cx.fillStyle='#616161';cx.beginPath();cx.arc(sx-1,sy-1,2,0,Math.PI*2);cx.fill();
  });
}

function checkCoalHits() {
  projs.forEach(p=>{
    if(p.type!=='coal'||p.life<=0) return;
    if(player&&!player.dead&&player.inv<=0&&player.form!=='sun'){
      if(Math.abs(player.x+player.w/2-p.x)<20&&Math.abs(player.y+player.h/2-p.y)<25){
        player.takeDamage();p.life=0;
      }
    }
  });
}
